<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings | Lumora AI</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo"><img src="images/logo.png" alt="Lumora AI"></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="predict.html">Predict</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="study-plan.html">Study Plan</a>
        <a href="profile.html">Profile</a>
    </nav>
</header>

<div class="settings-container">
    <h1>Settings</h1>

    <div class="setting">
        <h3>Notifications</h3>
        <label><input type="checkbox" style="width:auto; margin-right:8px;" checked> Email me weekly progress summaries</label>
        <label><input type="checkbox" style="width:auto; margin-right:8px;" checked> Remind me about my study plan</label>
    </div>

    <div class="setting">
        <h3>Preferences</h3>
        <label>Language</label>
        <select>
            <option>English</option>
            <option>Swahili</option>
        </select>
        <label>Theme</label>
        <select>
            <option>Light</option>
            <option>Dark</option>
        </select>
    </div>

    <div class="setting">
        <h3>Account</h3>
        <label>Change Password</label>
        <input type="password" placeholder="New password">
    </div>

    <button class="btn-predict">Save Settings</button>
</div>

<footer>
    <div class="footer-content">
        <p>&copy; 2026 Lumora AI. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
