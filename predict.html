<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumora AI - Student Performance Predictor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --------------------------------------------------
           LUMORA AI BRAND VARIABLES & THEMING
        -------------------------------------------------- */
        :root {
            --lumora-primary: #6366f1;       /* Premium Indigo */
            --lumora-primary-dark: #4f46e5;
            --lumora-secondary: #a855f7;     /* Vibrant Purple */
            --lumora-accent: #14b8a6;        /* Teal for positive highlights */
            --lumora-danger: #ef4444;        /* Red for risk indicators */
            --lumora-warning: #f59e0b;       /* Amber */
            --lumora-bg: #fafafa;            /* Clean light-gray canvas */
            --card-bg: #ffffff;
            --text-main: #0f172a;            /* Deep slate */
            --text-muted: #64748b;          /* Cool slate gray */
            --border-light: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 10px 15px -3px rgba(99, 102, 241, 0.05), 0 4px 6px -4px rgba(99, 102, 241, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --------------------------------------------------
           BASE RESET & LAYOUT
        -------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--lumora-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --------------------------------------------------
           HEADER & NAVIGATION
        -------------------------------------------------- */
        header {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            background: linear-gradient(135deg, var(--lumora-primary), var(--lumora-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo i {
            color: var(--lumora-primary);
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--lumora-primary);
        }

        /* --------------------------------------------------
           MAIN CONTAINER & PAGE LAYOUT
        -------------------------------------------------- */
        main {
            flex: 1;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 24px;
            display: grid;
            grid-template-columns: 1.1fr 1.2fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 20px 16px;
            }
        }

        /* Card Panels */
        .panel {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-lg);
            padding: 32px;
            transition: var(--transition-smooth);
        }

        .panel:hover {
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.08);
        }

        .panel-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title i {
            color: var(--lumora-primary);
        }

        /* --------------------------------------------------
           FORM DESIGN
        -------------------------------------------------- */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            pointer-events: none;
            font-size: 0.95rem;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-sm);
            background-color: #f8fafc;
            font-size: 0.95rem;
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition-smooth);
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--lumora-primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        button.btn-predict {
            width: 100%;
            background: linear-gradient(135deg, var(--lumora-primary), var(--lumora-primary-dark));
            color: #fff;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
            transition: var(--transition-smooth);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button.btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        button.btn-predict:active {
            transform: translateY(0);
        }

        /* --------------------------------------------------
           RESULTS DASHBOARD & ANIMATED METRICS
        -------------------------------------------------- */
        .results-panel {
            opacity: 0;
            transform: translateY(15px);
            visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .results-panel.active {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        /* Score & Progress Circle Container */
        .prediction-hero {
            display: flex;
            align-items: center;
            gap: 24px;
            background: linear-gradient(135deg, #f5f3ff, #ede9fe);
            border: 1px solid #ddd6fe;
            padding: 24px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
        }

        .predicted-score-container {
            flex: 1;
        }

        .prediction-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .predicted-score {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--lumora-primary-dark);
            line-height: 1.1;
        }

        .predicted-status {
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 4px;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
        }

        /* Beautiful Animated Progress Bar */
        .progress-bar-wrapper {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.06);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 14px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--lumora-primary), var(--lumora-secondary));
            border-radius: 5px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Interactive Grid of Cards (Confidence, Risk) */
        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background-color: #fff;
        }

        .metric-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text
