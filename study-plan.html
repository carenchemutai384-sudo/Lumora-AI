<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Study Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-bold text-indigo-600">Your Personalized Study Plan</h1>
            <p class="text-gray-600 mt-2">Customized schedule based on your predicted exam performance.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 space-y-6">
                <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="text-2xl">📅</span>
                        <h2 class="text-xl font-semibold">Weekly Timetable</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-gray-200 text-gray-500 text-sm">
                                    <th class="pb-3">Day</th>
                                    <th class="pb-3">Focus Area</th>
                                    <th class="pb-3">Time</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-sm">
                                <tr>
                                    <td class="py-3 font-medium">Monday</td>
                                    <td class="py-3">Core Concepts & Theory</td>
                                    <td class="py-3 text-indigo-600">09:00 AM - 11:00 AM</td>
                                end
                                <tr>
                                    <td class="py-3 font-medium">Wednesday</td>
                                    <td class="py-3">Practice Problems & Quizzes</td>
                                    <td class="py-3 text-indigo-600">02:00 PM - 04:00 PM</td>
                                </tr>
                                <tr>
                                    <td class="py-3 font-medium">Friday</td>
                                    <td class="py-3">Weak Areas Revision</td>
                                    <td class="py-3 text-indigo-600">10:00 AM - 12:00 PM</td>
