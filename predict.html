<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #d1d5db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .results-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed var(--border-color);
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .prediction-box {
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .recommendations-box {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
            padding: 15px;
            border-radius: 6px;
        }

        .recommendations-box ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Performance Predictor</h2>
    
    <form id="predictionForm">
        <div class="form-group">
            <label for="grades">Current Grade (GPA / Percentage):</label>
            <input type="number" id="grades" min="0" max="100" step="0.1" placeholder="e.g. 85 or 3.5" required>
        </div>

        <div class="form-group">
            <label for="attendance">Attendance Rate (%):</label>
            <input type="number" id="attendance" min="0" max="100" placeholder="e.g. 95" required>
        </div>

        <div class="form-group">
            <label for="studyHours">Weekly Study Hours:</label>
            <input type="number" id="studyHours" min="0" max="168" placeholder="e.g. 15" required>
        </div>

        <div class="form-group">
            <label for="learningHabits">Primary Learning Habit:</label>
            <select id="learningHabits" required>
                <option value="" disabled selected>Select an option</option>
                <option value="active">Active Recall & Spaced Repetition</option>
                <option value="visual">Visual Aids & Mind Mapping</option>
                <option value="group">Collaborative Study Groups</option>
                <option value="passive">Passive Reading & Highlighting</option>
                <option value="cramming">Last-minute Cramming</option>
            </select>
        </div>

        <button type="submit">Predict Performance</button>
    </form>

    <div class="results-section" id="resultsSection">
        <div class="prediction-box">
            <strong>Predicted Output:</strong> <span id="predictedOutput">Calculating...</span>
        </div>
        <div class="recommendations-box">
            <strong>AI Recommendations:</strong>
            <ul id="recommendationList">
                </ul>
        </div>
    </div>
</div>

<script>
    document.getElementById('predictionForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Get inputs
        const grades = parseFloat(document.getElementById('grades').value);
        const attendance = parseFloat(document.getElementById('attendance').value);
        const studyHours = parseFloat(document.getElementById('studyHours').value);
        const habit = document.getElementById('learningHabits').value;

        // Elements for output
        const resultsSection = document.getElementById('resultsSection');
        const predictedOutput = document.getElementById('predictedOutput');
        const recommendationList = document.getElementById('recommendationList');

        // Simple mock algorithm to simulate prediction and AI recommendations
        let predictedScore = Math.round((grades * 0.5) + (attendance * 0.3) + (Math.min(studyHours * 2, 20)));
        if (habit === 'passive' || habit === 'cramming') predictedScore -= 5;
        if (habit === 'active') predictedScore += 5;
        predictedScore = Math.min(Math.max(predictedScore, 0), 100);

        // Map predicted score to a grade level
        let status = "Excellent";
        if (predictedScore < 60) status = "At Risk";
        else if (predictedScore < 75) status = "Average";
        else if (predictedScore < 90) status = "Above Average";

        predictedOutput.textContent = `${predictedScore}% (${status})`;

        // Generate tailored AI recommendations
        recommendationList.innerHTML = '';
        const recs = [];

        if (attendance < 85) {
            recs.push("Attendance is low. Try to attend more live sessions to catch critical topics.");
        }
        if (studyHours < 10) {
            recs.push("Increase weekly study hours slightly. Aim for at least 10-12 hours.");
        }
        if (habit === 'passive' || habit === 'cramming') {
            recs.push("Switch passive reading to Active Recall techniques for better long-term retention.");
        } else {
            recs.push("Your study techniques look solid. Keep using active testing strategies!");
        }
        if (grades < 70) {
            recs.push("Schedule a session with a peer tutor or office hours to review core concepts.");
        }

        recs.forEach(rec => {
            const li = document.createElement('li');
            li.textContent = rec;
            recommendationList.appendChild(li);
        });

        // Show result card
        resultsSection.classList.add('active');
        resultsSection.scrollIntoView({ behavior: 'smooth' });
    });
</script>

</body>
</html>
