<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Lumora AI</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
width:350px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
}

.logo{
font-size:32px;
font-weight:700;
color:#2a5298;
margin-bottom:10px;
}

h2{
margin-bottom:5px;
}

p{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#2a5298;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1e3c72;
}

a{
color:#2a5298;
text-decoration:none;
font-weight:600;
}

.footer{
margin-top:20px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
✨ Lumora AI
</div>

<h2>Welcome Back</h2>

<p>Sign in to continue your learning journey.</p>

<form>

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<button type="submit">
Login
</button>

</form>

<div class="footer">

<p>
Don't have an account?
<a href="signup.html">Create one</a>
</p>

<p>
<a href="#">Forgot Password?</a>
</p>

</div>

</div>

</body>
</html>
