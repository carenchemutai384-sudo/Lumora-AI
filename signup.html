<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Lumora AI</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<button id="themeToggle" aria-label="Toggle dark mode" style="position: fixed; top: 20px; right: 20px; z-index: 1000;">🌙</button>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo">✨ Lumora AI</div>
        <h2>Create Account</h2>
        <p>Start your smarter learning journey today.</p>

        <form id="signupForm">
            <input type="text" id="signupName" placeholder="Full Name" required>
            <input type="email" id="signupEmail" placeholder="Email Address" required>
            <input type="password" id="signupPassword" placeholder="Create Password (min. 6 characters)" required>
            <input type="password" id="signupConfirm" placeholder="Confirm Password" required>
            <button class="primary-btn" type="submit" id="signupBtn">Sign Up</button>
            <p style="color: #ef4444; font-size: 0.85rem; min-height: 1.2em; margin-top: 8px;" id="signupError"></p>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://lumora-ai-backend-jsvf.onrender.com/signup';
    const form = document.getElementById('signupForm');
    const errorEl = document.getElementById('signupError');
    const btn = document.getElementById('signupBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';

        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;

        if (password !== confirm) {
            errorEl.textContent = 'Passwords do not match.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account... (may take up to a minute)';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('signupName').value,
                    email: document.getElementById('signupEmail').value,
                    password: password
                })
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Sign up failed.');
            }

            window.location.href = 'login.html';

        } catch (err) {
            errorEl.textContent = err.message;
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign Up';
        }
    });
</script>

<script src="js/theme-toggle.js"></script>
<script src="js/scroll-animations.js"></script>
</body>
</html>
