<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Lumora AI</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo">✨ Lumora AI</div>
        <h2>Welcome Back</h2>
        <p>Sign in to continue your learning journey.</p>

        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button class="primary-btn" type="submit" id="loginBtn">Login</button>
            <p style="color: #ef4444; font-size: 0.85rem; min-height: 1.2em; margin-top: 8px;" id="loginError"></p>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Create one</a></p>
            <p><a href="#">Forgot Password?</a></p>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://lumora-ai-backend-jsvf.onrender.com/login';
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Logging in... (may take up to a minute)';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value
                })
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Login failed.');
            }

            localStorage.setItem('lumoraUser', data.name);
            localStorage.setItem('lumoraEmail', document.getElementById('loginEmail').value);
            window.location.href = 'dashboard.html';

        } catch (err) {
            errorEl.textContent = err.message;
        } finally {
            btn.disabled = false;
            btn.textContent = 'Login';
        }
    });
</script>

</body>
</html>
