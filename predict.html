<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumora AI - Student Performance Predictor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        main {
            flex: 1;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 24px;
            display: grid;
            grid-template-columns: 1.1fr 1.2fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 20px 16px;
            }
        }

        .results-panel {
            opacity: 0;
            transform: translateY(15px);
            visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .results-panel.active {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .prediction-hero {
            display: flex;
            align-items: center;
            gap: 24px;
            background: linear-gradient(135deg, #f5f3ff, #ede9fe);
            border: 1px solid #ddd6fe;
            padding: 24px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
        }

        .predicted-score-container {
            flex: 1;
        }

        .prediction-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .predicted-score {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--lumora-primary-dark);
            line-height: 1.1;
        }

        .predicted-status {
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 4px;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .progress-bar-wrapper {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.06);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 14px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--lumora-primary), var(--lumora-secondary));
            border-radius: 5px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background-color: #fff;
        }

        .metric-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .metric-card-value {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .metric-card-value.risk-low { color: var(--lumora-accent); }
        .metric-card-value.risk-moderate { color: var(--lumora-warning); }
        .metric-card-value.risk-high { color: var(--lumora-danger); }

        .insight-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .insight-card {
            border-radius: var(--radius-md);
            padding: 16px;
            border: 1.5px solid var(--border-light);
        }

        .insight-card.strengths {
            background-color: #f0fdfa;
            border-color: #99f6e4;
        }

        .insight-card.gaps {
            background-color: #fef2f2;
            border-color: #fecaca;
        }

        .insight-card-title {
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .insight-card.strengths .insight-card-title { color: var(--lumora-accent); }
        .insight-card.gaps .insight-card-title { color: var(--lumora-danger); }

        .insight-card ul {
            padding-left: 18px;
            font-size: 0.85rem;
            color: var(--text-main);
            line-height: 1.55;
        }

        .insight-card li { margin-bottom: 6px; }

        .recommendations-panel {
            background-color: #f8fafc;
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            margin-bottom: 20px;
        }

        .recommendations-panel h3 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--lumora-primary-dark);
        }

        .recommendations-panel ul {
            padding-left: 18px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-main);
        }

        .recommendations-panel li { margin-bottom: 6px; }

        @media (max-width: 640px) {
            .insight-grid, .metric-grid { grid-template-columns: 1fr; }
            .prediction-hero { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
